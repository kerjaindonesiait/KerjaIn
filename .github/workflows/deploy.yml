name: Build & Deploy (prerendered)

# Optional CI deploy — requires GitHub secrets (see README below).
# Vercel Git auto-deploy also works if Build Command is `npm run vercel-build`.
# Secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
on:
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Check Vercel secrets
        run: |
          missing=0
          for name in VERCEL_TOKEN VERCEL_ORG_ID VERCEL_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              echo "::error::$name is not set in GitHub → Settings → Secrets and variables → Actions"
              missing=1
            fi
          done
          exit $missing

      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Vercel CLI
        run: npm i -g vercel
      - run: vercel pull --yes --environment=production
      - name: Vercel build (runs vite build + prerender + assertion)
        run: vercel build --prod
      - run: vercel deploy --prebuilt --prod
